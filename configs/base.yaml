data:
  root: /home/ray/Downloads/keyframes_pilot_cockpit/frames
  train_ann: /home/ray/Downloads/keyframes_pilot_cockpit/annotations/train_annotations.csv
  val_ann: /home/ray/Downloads/keyframes_pilot_cockpit/annotations/val_annotations.csv
  num_classes: 8
  clip_len: 32
  frame_interval: 1
  jitter_range: 2
  batch_size: 4
  num_workers: 4

model:
  resample_rate: 4
  speed_ratio: 4
  channel_ratio: 8
  kernel_size: 7
  dropout: 0.5
  stta_stages: [true, true, true, true]
  enable_tcw: true
  enable_tch: true
  enable_thw: true

train:
  max_epochs: 150
  seed: 42
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  grad_clip: 40
  warmup_epochs: 5
  warmup_start_factor: 0.1

logging:
  wandb_project: pilot-action-recognition
  wandb_name: null
  log_every_n_steps: 50
  save_top_k: 3
  val_check_interval: 2
